<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R-Well Salon & Spa - Login</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      background: linear-gradient(135deg, #1E8C8C, #E53965);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background-color: #fff;
      width: 350px;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-container img {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    .login-container h2 {
      color: #1E8C8C;
      margin-bottom: 25px;
    }

    .login-container input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    .login-container button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #E53965;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s ease;
    }

    .login-container button:hover {
      background-color: #d81b60;
    }

    .error-msg {
      color: red;
      font-size: 0.9rem;
      margin-top: 10px;
      display: none;
    }

  </style>
</head>
<body>
  <div class="login-container">
    <img src="./assets/img/logo.png" alt="R-Well Logo">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Log In</button>
      <div class="error-msg" id="errorMsg">Invalid username or password</div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Dummy validation
      if(username === 'admin' && password === 'admin123') {
        alert('Login successful!');
        // Redirect to dashboard
        window.location.href = 'dashboard.php';
      } else {
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
